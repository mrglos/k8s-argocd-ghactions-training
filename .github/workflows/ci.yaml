name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "app/**" # Only run when application code changes!

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write # <-- CHANGED: The robot now has permission to write code!
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # --- THE NEW MAGIC STEPS ---
      - name: Update values.yaml with new image tag
        run: |
          # Get the first 7 characters of the Git commit hash
          SHORT_SHA="${GITHUB_SHA::7}"

          # Use sed to find the line starting with "tag:" and replace it with our new tag
          sed -i "s/tag: .*/tag: sha-${SHORT_SHA}/" backend-local/values.yaml

      - name: Commit and push changes
        run: |
          # Tell Git who is making this commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add the modified values.yaml, commit, and push!
          git add backend-local/values.yaml
          git commit -m "cd: automatically update image tag to sha-${GITHUB_SHA::7}"
          git push
